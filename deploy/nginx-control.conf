# Control Tower — standalone nginx server block for control.usesmpt.com
#
# deploy-vps.sh writes this automatically. Kept here for reference / manual use.
# This is a NEW file in sites-available; it does not touch any existing site.
# After placing it, run `certbot --nginx -d control.usesmpt.com` to add TLS.

server {
    listen 80;
    listen [::]:80;
    server_name control.usesmpt.com;

    # Let certbot's HTTP-01 challenge through without auth.
    location ^~ /.well-known/acme-challenge/ {
        auth_basic off;
        root /var/www/html;
    }

    location / {
        auth_basic           "Control Tower";
        auth_basic_user_file /etc/nginx/.htpasswd-control;

        proxy_pass         http://127.0.0.1:3020;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
