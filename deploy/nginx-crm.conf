# Control Tower — nginx location for crm.traproyalties.com/crm
#
# Paste this block INTO the existing `server { ... }` block for
# crm.traproyalties.com (the HTTPS/443 one), REPLACING the current
# `location /crm { ... }` that points at TrapCRM.
#
# Basic Auth file is created by deploy-vps.sh at /etc/nginx/.htpasswd-crm.
# The app runs on 127.0.0.1:3020 with Next.js basePath=/crm, so the /crm
# prefix must be PRESERVED (no trailing slash on proxy_pass).

location /crm {
    auth_basic           "Control Tower";
    auth_basic_user_file /etc/nginx/.htpasswd-crm;

    proxy_pass         http://127.0.0.1:3020;
    proxy_http_version 1.1;
    proxy_set_header   Upgrade $http_upgrade;
    proxy_set_header   Connection "upgrade";
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
}
